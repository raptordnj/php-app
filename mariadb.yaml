apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  labels:
    app: mariadb
spec:
  ports:
    - port: 3610
      targetPort: 3610
      name: mysql
  selector:
    app: mariadb
  clusterIP: None # Headless service for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
spec:
  serviceName: "mariadb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          args:
            - "--port=3610"
          ports:
            - containerPort: 3610
              name: mysql
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: "rootpassword" # In production, use Kubernetes Secrets
            - name: MARIADB_DATABASE
              value: "appdb"
            - name: MARIADB_USER
              value: "appuser"
            - name: MARIADB_PASSWORD
              value: "apppassword"
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mariadb-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
