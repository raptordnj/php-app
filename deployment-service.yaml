apiVersion: apps/v1
kind: Deployment

metadata:
  name: php-nginx-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: php-nginx-app

  template:
    metadata:
      labels:
        app: php-nginx-app

    spec:
      initContainers:
        - name: copy-code
          image: php-app:8.5
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - cp -r /var/www/html/* /app
          volumeMounts:
            - name: app-code
              mountPath: /app

      containers:
        - name: php-fpm
          image: php-app:8.5
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html

        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d

      volumes:
        - name: app-code
          emptyDir: {}

        - name: nginx-config
          configMap:
            name: nginx-config

---
apiVersion: v1
kind: Service

metadata:
  name: nginx-lb

spec:
  type: NodePort
  selector:
    app: php-nginx-app
  ports:
    - port: 80
      targetPort: 80